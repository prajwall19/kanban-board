<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Kanban Board</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
        darkMode: "class",
      };
    </script>
  </head>
  <body
    class="h-full bg-gradient-to-br from-sky-50 via-indigo-50 to-emerald-50 text-slate-900 transition-colors duration-500 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 dark:text-slate-100"
  >
    <div class="relative min-h-screen flex flex-col overflow-hidden">
      <!-- Soft background shapes -->
      <div
        class="pointer-events-none absolute -left-24 top-24 h-56 w-56 rounded-full bg-sky-200/80 blur-2xl dark:bg-sky-800/60"
      ></div>
      <div
        class="pointer-events-none absolute -right-24 bottom-32 h-64 w-64 rounded-full bg-emerald-200/80 blur-2xl dark:bg-emerald-800/60"
      ></div>
      <!-- Header -->
      <header
        class="border-b border-slate-200/70 bg-white/70 backdrop-blur-xl shadow-sm dark:bg-slate-900/70 dark:border-slate-800"
      >
        <div
          class="mx-auto max-w-6xl px-4 py-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <div>
            <h1 class="text-2xl font-semibold tracking-tight text-slate-800 dark:text-slate-50">
              Kanban Board
            </h1>
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
              Simple three-column board for tracking tasks.
            </p>
          </div>
          <div class="flex items-center gap-3">
            <button
              id="clearBoardBtn"
              class="hidden sm:inline-flex items-center gap-2 rounded-full border border-rose-100/80 bg-rose-50/90 px-3 py-1.5 text-xs font-medium text-rose-700/90 hover:bg-rose-100 hover:border-rose-200 dark:border-rose-900/60 dark:bg-rose-950/40 dark:text-rose-300/90"
            >
              Clear Board
            </button>
            <button
              id="themeToggleBtn"
              class="inline-flex items-center gap-2 rounded-full border border-slate-200/80 bg-white/90 px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800/90 dark:text-slate-100"
            >
              <span id="themeIcon" aria-hidden="true">🌙</span>
              <span id="themeLabel" class="hidden sm:inline">Dark mode</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main class="flex-1">
        <section
          class="mx-auto max-w-6xl px-4 py-8 space-y-8 rounded-3xl bg-white/70 shadow-xl shadow-slate-200/70 ring-1 ring-white/60 backdrop-blur-sm dark:bg-slate-900/80 dark:shadow-black/40 dark:ring-slate-800/80"
        >
          <!-- Intro / hero -->
          <div class="flex flex-col gap-2 text-sm text-slate-600 dark:text-slate-400">
            <p>
              Use the input below to add tasks. Move them between columns as they
              progress, and remove them when they are no longer needed.
            </p>
          </div>
          <!-- Task creator -->
          <div
            class="rounded-2xl border border-slate-200 bg-white/90 p-4 shadow-sm backdrop-blur-sm dark:border-slate-700 dark:bg-slate-800/80"
          >
            <form
              id="taskForm"
              class="flex flex-col gap-3 sm:flex-row sm:items-center"
            >
              <div class="flex-1">
                <label
                  for="taskTitle"
                  class="sr-only"
                  >Task title</label
                >
                <input
                  id="taskTitle"
                  type="text"
                  autocomplete="off"
                  placeholder="Add a new task (e.g. “Design login page UI”)"
                  class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none ring-primary-500/0 transition focus:bg-white focus:ring-2 focus:ring-primary-500/60 dark:border-slate-600 dark:bg-slate-900 dark:focus:bg-slate-950"
                  required
                />
              </div>
              <button
                type="submit"
                class="inline-flex items-center justify-center rounded-xl bg-primary-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-primary-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-100 dark:ring-offset-slate-900"
              >
                Add Task
              </button>
            </form>
            <p
              id="taskError"
              class="mt-2 text-xs text-red-500 hidden"
            >
              Please enter a task title.
            </p>
          </div>

          <!-- Columns -->
          <div
            class="grid gap-4 md:grid-cols-3"
            aria-label="Kanban board"
          >
            <!-- Todo column -->
            <section
              class="flex flex-col rounded-2xl border border-sky-300 bg-sky-50/90 p-3 shadow-md shadow-sky-200/80 backdrop-blur-sm dark:border-sky-600 dark:bg-slate-900/80 dark:shadow-sky-900/40"
              aria-label="Todo column"
            >
              <header class="mb-2 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                  <span
                    class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-sky-100 text-xs font-medium text-sky-700 dark:bg-sky-900/60 dark:text-sky-200"
                    >1</span
                  >
                  <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-700 dark:text-slate-100">
                    Todo
                  </h2>
                </div>
                <span
                  id="todoCount"
                  class="rounded-full bg-sky-100 px-2 py-0.5 text-xs font-medium text-sky-800 dark:bg-sky-900 dark:text-sky-100"
                  >0</span
                >
              </header>
              <div
                id="todoColumn"
                class="min-h-[120px] flex-1 space-y-3 rounded-xl border border-dashed border-sky-300 bg-sky-50 p-2 text-sm transition-colors dark:border-sky-700 dark:bg-slate-950/60"
                data-column="todo"
              ></div>
            </section>

            <!-- Doing column -->
            <section
              class="flex flex-col rounded-2xl border border-amber-300 bg-amber-50/90 p-3 shadow-md shadow-amber-200/80 backdrop-blur-sm dark:border-amber-600 dark:bg-slate-900/80 dark:shadow-amber-900/40"
              aria-label="Doing column"
            >
              <header class="mb-2 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                  <span
                    class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-amber-100 text-xs font-medium text-amber-700 dark:bg-amber-900/60 dark:text-amber-200"
                    >2</span
                  >
                  <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-700 dark:text-slate-100">
                    Doing
                  </h2>
                </div>
                <span
                  id="doingCount"
                  class="rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-800 dark:bg-amber-900 dark:text-amber-100"
                  >0</span
                >
              </header>
              <div
                id="doingColumn"
                class="min-h-[120px] flex-1 space-y-3 rounded-xl border border-dashed border-amber-300 bg-amber-50 p-2 text-sm transition-colors dark:border-amber-700 dark:bg-slate-950/60"
                data-column="doing"
              ></div>
            </section>

            <!-- Done column -->
            <section
              class="flex flex-col rounded-2xl border border-emerald-300 bg-emerald-50/90 p-3 shadow-md shadow-emerald-200/80 backdrop-blur-sm dark:border-emerald-600 dark:bg-slate-900/80 dark:shadow-emerald-900/40"
              aria-label="Done column"
            >
              <header class="mb-2 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                  <span
                    class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-emerald-100 text-xs font-medium text-emerald-700 dark:bg-emerald-900/60 dark:text-emerald-200"
                    >3</span
                  >
                  <h2 class="text-sm font-semibold tracking-wide uppercase text-slate-700 dark:text-slate-100">
                    Done
                  </h2>
                </div>
                <span
                  id="doneCount"
                  class="rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-800 dark:bg-emerald-900 dark:text-emerald-100"
                  >0</span
                >
              </header>
              <div
                id="doneColumn"
                class="min-h-[120px] flex-1 space-y-3 rounded-xl border border-dashed border-emerald-300 bg-emerald-50 p-2 text-sm transition-colors dark:border-emerald-700 dark:bg-slate-950/60"
                data-column="done"
              ></div>
            </section>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer
        class="border-t border-slate-200/70 bg-white/70 py-3 text-center text-xs text-slate-500 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-900/70 dark:text-slate-400"
      >
        Kanban board using HTML, CSS and JavaScript.
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
